function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === PW) {

    document.getElementById('main').style.display = 'block';
    loadFromSheets();

}

    + '&entry.1332172167=' + encodeURIComponent(phone)
    + '&entry.1996022761=' + encodeURIComponent(workshop);

  return `https://wa.me/${p}?text=${encodeURIComponent(msg)}`;
}

const sentState = {};

function jsonp(url) {
  return new Promise((resolve) => {
    const cbName = 'cb_' + Date.now();
    window[cbName] = (data) => {
      resolve(data);
      delete window[cbName];
      document.head.removeChild(script);
    };
    const script = document.createElement('script');
    script.src = url + '&callback=' + cbName;
    document.head.appendChild(script);
  });
}

async function loadFromSheets() {
  try {
    const rows = await jsonp(SCRIPT_URL + '?t=' + Date.now());
    rows.forEach(r => {
      if (r.sent === true || r.sent === 'TRUE') {
        sentState[r.name + r.phone] = { sent: true, time: r.time };
      }
    });
    document.getElementById('status').innerHTML = '<span class="sync-ok">✅ 已連接 Google Sheets</span>';
  } catch(e) {
    document.getElementById('status').innerHTML = '<span class="sync-err">⚠️ 無法連接 Sheets</span>';
  }
  renderTables();
}

function updateSheet(name, phone, workshop, sent) {
  const url = SCRIPT_URL
    + '?action=update'
    + '&name=' + encodeURIComponent(name)
    + '&phone=' + encodeURIComponent(phone)
    + '&sent=' + sent;
  jsonp(url);
}

async function initSheet() {
  if (!confirm('確定要重設 Sheets 資料？')) return;
  document.getElementById('status').innerHTML = '⏳ 初始化中...';
  const rows = data.map(([workshop, name, phone]) => ({ workshop, name, phone }));
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action: 'init', rows }),
    });
    document.getElementById('status').innerHTML = '<span class="sync-ok">✅ Sheets 已初始化</span>';
  } catch(e) {
    document.getElementById('status').innerHTML = '<span class="sync-err">⚠️ 初始化失敗</span>';
  }
}

function renderTables() {
  const groups = {};
  data.forEach(([workshop, name, phone]) => {
    if (!groups[workshop]) groups[workshop] = [];
    groups[workshop].push([name, phone]);
  });
  const container = document.getElementById('tables');
  container.innerHTML = '';
  Object.entries(groups).forEach(([workshop, members]) => {
    const h2 = document.createElement('h2');
    h2.textContent = workshop;
    container.appendChild(h2);
    const table = document.createElement('table');
    table.innerHTML = `<tr><th>#</th><th>姓名</th><th>電話</th><th>發送</th><th>已發送</th><th>時間</th></tr>`;
    members.forEach(([name, phone], i) => {
      const key = name + phone;
      const state = sentState[key] || { sent: false, time: '' };
      const tr = document.createElement('tr');
      if (state.sent) tr.classList.add('sent');
      const waLink = phone
        ? `<a class="wa-btn" href="${makeWaLink(phone, name, workshop)}" target="_blank">📲 發送</a>`
        : `<span style="color:#B0A898;font-size:12px">無電話</span>`;
      tr.innerHTML = `<td>${i+1}</td><td>${name}</td><td>${phone||'—'}</td><td>${waLink}</td><td><input type="checkbox" ${state.sent?'checked':''} style="width:18px;height:18px;cursor:pointer;accent-color:#25D366;"></td><td><span class="time-label">${state.time||''}</span></td>`;
      const cb = tr.querySelector('input[type=checkbox]');
      cb.addEventListener('change', async () => {
        sentState[key] = { sent: cb.checked, time: cb.checked ? new Date().toLocaleString('zh-HK') : '' };
        tr.classList.toggle('sent', cb.checked);
        tr.querySelector('.time-label').textContent = sentState[key].time;
        updateSheet(name, phone, workshop, cb.checked);
      });
      table.appendChild(tr);
    });
    container.appendChild(table);
  });
}
